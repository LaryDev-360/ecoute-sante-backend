services:
  db:
    image: postgres:16-alpine
    container_name: sante_ecoute_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sante_ecoute
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sante_ecoute"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
