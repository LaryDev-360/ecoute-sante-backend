openapi: 3.0.3
info:
  title: Santé Écoute API
  version: 1.0.0
  description: API de gestion des signalements et plaintes sanitaires
paths:
  /api/v1/ai/classify/:
    post:
      operationId: v1_ai_classify_create
      description: Appelle un modèle gratuit via OpenRouter pour suggérer une catégorie
        et une priorité. **Résultat indicatif uniquement** — le frontend doit laisser
        l'utilisateur confirmer ou modifier avant soumission.
      summary: Classifier une description (indicatif)
      tags:
      - AI
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
            examples:
              DescriptionD'attente:
                value:
                  description: J'ai attendu plus de 4 heures aux urgences sans aucune
                    information du personnel.
                summary: Description d'attente
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassifyResponse'
              examples:
                Suggestion:
                  value:
                    category: Temps d'attente
                    priority: HIGH
                    disclaimer: Suggestion indicative générée par IA — à valider par
                      le déclarant avant soumission.
          description: ''
        '400':
          description: Requête invalide (validation ou règle métier).
        '503':
          description: Service temporairement indisponible.
        '504':
          description: Délai dépassé lors de l'appel au service externe.
  /api/v1/assignments/:
    get:
      operationId: v1_assignments_list
      summary: Lister les affectations responsable ↔ établissement
      parameters:
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Nombre de résultats à retourner par page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserFacilityAssignmentList'
          description: ''
    post:
      operationId: v1_assignments_create
      summary: Affecter un responsable à un établissement
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFacilityAssignment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserFacilityAssignment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserFacilityAssignment'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFacilityAssignment'
          description: ''
  /api/v1/assignments/{id}/:
    get:
      operationId: v1_assignments_retrieve
      summary: Détail d'une affectation
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) affectation
          établissement.
        required: true
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserFacilityAssignment'
          description: ''
    delete:
      operationId: v1_assignments_destroy
      summary: Supprimer une affectation
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: Un(une) valeur entière unique identifiant ce(cette) affectation
          établissement.
        required: true
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Authentifie un utilisateur et retourne les tokens access et refresh.
      summary: Connexion JWT
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
            examples:
              ConnexionAdmin:
                value:
                  username: admin
                  password: admin123
                summary: Connexion admin
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      summary: Profil de l'utilisateur connecté
      tags:
      - Auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
          description: ''
        '401':
          description: Authentification requise ou token invalide.
  /api/v1/auth/otp/request/:
    post:
      operationId: v1_auth_otp_request_create
      description: 'Envoie un code à 6 chiffres par e-mail ou SMS. Usages : connexion
        sans mot de passe (`LOGIN`) ou réinitialisation (`RESET_PASSWORD`).'
      summary: Demander un code OTP
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
            examples:
              OTPConnexion:
                value:
                  identifier: admin@example.com
                  purpose: LOGIN
                summary: OTP connexion
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OTPRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OTPRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Si un compte correspondant existe, un code de vérification
            a été envoyé.
  /api/v1/auth/otp/verify/:
    post:
      operationId: v1_auth_otp_verify_create
      description: Pour `LOGIN`, retourne les tokens JWT. Pour `RESET_PASSWORD`, confirme
        le code avant la réinitialisation.
      summary: Vérifier un code OTP
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPVerify'
            examples:
              VérificationConnexion:
                value:
                  identifier: admin@example.com
                  otp: '123456'
                  purpose: LOGIN
                summary: Vérification connexion
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OTPVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OTPVerify'
        required: true
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/password/change/:
    post:
      operationId: v1_auth_password_change_create
      description: Permet à un utilisateur connecté de changer son mot de passe.
      summary: Changer le mot de passe
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePassword'
            examples:
              Changement:
                value:
                  old_password: admin123
                  new_password: NewSecurePass123!
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ChangePassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ChangePassword'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          description: Mot de passe modifié.
  /api/v1/auth/password/forgot/:
    post:
      operationId: v1_auth_password_forgot_create
      description: Envoie un code OTP pour réinitialiser le mot de passe.
      summary: Mot de passe oublié
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
            examples:
              MotDePasseOublié:
                value:
                  identifier: admin@example.com
                summary: Mot de passe oublié
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPassword'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Si un compte correspondant existe, un code de vérification
            a été envoyé.
  /api/v1/auth/password/reset/:
    post:
      operationId: v1_auth_password_reset_create
      description: Valide le code OTP et définit un nouveau mot de passe.
      summary: Réinitialiser le mot de passe
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPassword'
            examples:
              Réinitialisation:
                value:
                  identifier: admin@example.com
                  otp: '123456'
                  new_password: NewSecurePass123!
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetPassword'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetPassword'
        required: true
      security:
      - {}
      responses:
        '200':
          description: Mot de passe mis à jour.
  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: Échange un refresh token valide contre un nouveau access token.
      summary: Rafraîchir le token JWT
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
            examples:
              Refresh:
                value:
                  refresh: <refresh_token>
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/register/:
    post:
      operationId: v1_auth_register_create
      description: Crée un compte responsable d'établissement (`HOSPITAL_MANAGER`).
        Les rôles admin et ministère sont créés par un administrateur.
      summary: Inscription
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Register'
            examples:
              Inscription:
                value:
                  username: manager.chu
                  email: manager@chu.ci
                  password: SecurePass123!
                  password_confirm: SecurePass123!
                  phone: '+2250700000000'
                  first_name: Jean
                  last_name: Kouassi
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Register'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Register'
        required: true
      security:
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
          description: ''
        '400':
          description: Requête invalide (validation ou règle métier).
  /api/v1/complaints/:
    post:
      operationId: v1_complaints_create
      description: Crée une plainte avec statut initial `RECEIVED` et historique automatique.
        Pièces jointes optionnelles (JPEG, PNG, WebP, PDF — max 5 Mo). Pour `FACILITY_AGENT`,
        fournir un token JWT.
      summary: Soumettre un signalement
      tags:
      - Public
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintCreate'
            examples:
              PlainteUsager:
                value:
                  submitter_profile: CITIZEN
                  submission_type: IDENTIFIED
                  complaint_type: COMPLAINT
                  facility: 1
                  service: 2
                  category: 1
                  title: Temps d'attente aux urgences
                  description: Attente de plus de 3 heures sans information.
                  severity: HIGH
                  phone: '+22997000001'
                  email: citoyen@example.bj
                summary: Plainte usager
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ComplaintCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ComplaintCreate'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintCreateResponse'
          description: ''
        '400':
          description: Requête invalide (validation ou règle métier).
        '403':
          description: Accès refusé (rôle ou périmètre insuffisant).
        '404':
          description: Ressource introuvable.
  /api/v1/complaints/categories/:
    get:
      operationId: v1_complaints_categories_list
      summary: Lister les catégories de signalement
      parameters:
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      tags:
      - Public
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ComplaintCategoryPublic'
          description: ''
  /api/v1/complaints/meta/submitter-profiles/:
    get:
      operationId: v1_complaints_meta_submitter_profiles_list
      summary: Profils de déclarant disponibles
      tags:
      - Public
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubmitterProfileChoices'
          description: ''
  /api/v1/complaints/track/{reference}/:
    get:
      operationId: v1_complaints_track_retrieve
      description: Retourne le statut et la chronologie publique (sans commentaires
        internes).
      summary: Suivre un signalement par référence
      parameters:
      - in: path
        name: reference
        schema:
          type: string
        required: true
      tags:
      - Public
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintTrack'
          description: ''
        '404':
          description: Référence introuvable
  /api/v1/facilities/:
    get:
      operationId: v1_facilities_list
      summary: Lister les établissements
      parameters:
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Nombre de résultats à retourner par page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFacilityListList'
          description: ''
    post:
      operationId: v1_facilities_create
      description: 'Admin/ministère : création libre. Responsable sans affectation
        : création + rattachement automatique.'
      summary: Créer un établissement
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FacilityWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FacilityWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityWrite'
          description: ''
  /api/v1/facilities/{facility_pk}/services/:
    get:
      operationId: v1_facilities_services_list
      summary: Lister les services d'un établissement
      parameters:
      - in: path
        name: facility_pk
        schema:
          type: integer
        required: true
      - name: ordering
        required: false
        in: query
        description: Quel champ utiliser pour classer les résultats.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: Un numéro de page de l'ensemble des résultats.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Nombre de résultats à retourner par page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: Un terme de recherche.
        schema:
          type: string
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFacilityServiceList'
          description: ''
    post:
      operationId: v1_facilities_services_create
      summary: Ajouter un service
      parameters:
      - in: path
        name: facility_pk
        schema:
          type: integer
        required: true
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityServiceWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FacilityServiceWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FacilityServiceWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityServiceWrite'
          description: ''
  /api/v1/facilities/{facility_pk}/services/{id}/:
    get:
      operationId: v1_facilities_services_retrieve
      summary: Détail d'un service
      parameters:
      - in: path
        name: facility_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityService'
          description: ''
    put:
      operationId: v1_facilities_services_update
      summary: Mettre à jour un service
      parameters:
      - in: path
        name: facility_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityServiceWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FacilityServiceWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FacilityServiceWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityServiceWrite'
          description: ''
    patch:
      operationId: v1_facilities_services_partial_update
      summary: Mettre à jour partiellement un service
      parameters:
      - in: path
        name: facility_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedFacilityServiceWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedFacilityServiceWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedFacilityServiceWrite'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityServiceWrite'
          description: ''
    delete:
      operationId: v1_facilities_services_destroy
      description: Désactivation logique (`active=false`).
      summary: Désactiver un service
      parameters:
      - in: path
        name: facility_pk
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/facilities/{id}/:
    get:
      operationId: v1_facilities_retrieve
      summary: Détail d'un établissement
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityDetail'
          description: ''
    put:
      operationId: v1_facilities_update
      summary: Mettre à jour un établissement
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FacilityWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FacilityWrite'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityWrite'
          description: ''
    patch:
      operationId: v1_facilities_partial_update
      summary: Mettre à jour partiellement
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedFacilityWrite'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedFacilityWrite'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedFacilityWrite'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityWrite'
          description: ''
    delete:
      operationId: v1_facilities_destroy
      description: Désactivation logique (`active=false`), pas de suppression physique.
      summary: Désactiver un établissement
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Facilities
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/facilities/import/:
    post:
      operationId: v1_facilities_import_create
      summary: Importer des établissements (JSON)
      tags:
      - Facilities
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityImport'
            examples:
              ImportJSON:
                value:
                  facilities:
