components:
  schemas:
    BlankEnum:
      enum:
      - ''
    ChangePassword:
      type: object
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - new_password
      - old_password
    ClassifyRequest:
      type: object
      properties:
        description:
          type: string
          description: Texte libre décrivant le signalement.
          maxLength: 5000
          minLength: 10
      required:
      - description
    ClassifyResponse:
      type: object
      properties:
        category:
          type: string
          description: Catégorie suggérée (indicative).
        priority:
          allOf:
          - $ref: '#/components/schemas/PriorityEnum'
          description: |-
            Priorité suggérée (indicative).

            * `LOW` - LOW
            * `MEDIUM` - MEDIUM
            * `HIGH` - HIGH
            * `URGENT` - URGENT
        disclaimer:
          type: string
          description: 'Rappel : la suggestion n''est pas appliquée automatiquement.'
      required:
      - category
      - disclaimer
      - priority
    ComplaintAttachmentResponse:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        file:
          type: string
          format: uri
          readOnly: true
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - file
      - id
      - uploaded_at
    ComplaintCategoryPublic:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
      required:
      - id
      - name
    ComplaintCommentCreate:
      type: object
      properties:
        comment:
          type: string
      required:
      - comment
    ComplaintCreate:
      type: object
      description: |-
        Serializer de création — API publique et agents connectés.
        Le déclarant choisit son profil via `submitter_profile`.
      properties:
        submitter_profile:
          $ref: '#/components/schemas/SubmitterProfileEnum'
        submission_type:
          $ref: '#/components/schemas/SubmissionTypeEnum'
        complaint_type:
          $ref: '#/components/schemas/ComplaintTypeEnum'
        facility:
          type: integer
        service:
          type: integer
        category:
          type: integer
        reported_agent:
          type: integer
          nullable: true
        reported_agent_name:
          type: string
          description: Nom de l'agent visé si non enregistré dans le système
          maxLength: 255
        title:
          type: string
          maxLength: 255
        description:
          type: string
        incident_date:
          type: string
          format: date
          nullable: true
        severity:
          $ref: '#/components/schemas/SeverityEnum'
        phone:
          type: string
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 254
        preferred_contact_method:
          oneOf:
          - $ref: '#/components/schemas/PreferredContactMethodEnum'
          - $ref: '#/components/schemas/BlankEnum'
        attachments:
          type: array
          items:
            type: string
            format: uri
          writeOnly: true
      required:
      - category
      - complaint_type
      - description
      - facility
      - service
      - severity
      - submission_type
      - title
    ComplaintCreateResponse:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        reference:
          type: string
          readOnly: true
        current_status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        submitter_profile:
          allOf:
          - $ref: '#/components/schemas/SubmitterProfileEnum'
          readOnly: true
        submission_type:
          allOf:
          - $ref: '#/components/schemas/SubmissionTypeEnum'
          readOnly: true
        complaint_type:
          allOf:
          - $ref: '#/components/schemas/ComplaintTypeEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/ComplaintAttachmentResponse'
          readOnly: true
        message:
          type: string
          readOnly: true
      required:
      - attachments
      - complaint_type
      - created_at
      - current_status
      - id
      - message
      - reference
      - submission_type
      - submitter_profile
    ComplaintStatusTimeline:
      type: object
      properties:
        status:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - status
    ComplaintTrack:
      type: object
      properties:
        reference:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
        current_status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        complaint_type:
