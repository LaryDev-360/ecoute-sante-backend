        facility_type:
          $ref: '#/components/schemas/FacilityTypeEnum'
        region:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        address:
          type: string
        active:
          type: boolean
        services:
          type: array
          items:
            $ref: '#/components/schemas/FacilityServiceWrite'
    PreferredContactMethodEnum:
      enum:
      - EMAIL
      - PHONE
      - SMS
      type: string
      description: |-
        * `EMAIL` - E-mail
        * `PHONE` - Téléphone
        * `SMS` - SMS
    PriorityEnum:
      enum:
      - LOW
      - MEDIUM
      - HIGH
      - URGENT
      type: string
      description: |-
        * `LOW` - LOW
        * `MEDIUM` - MEDIUM
        * `HIGH` - HIGH
        * `URGENT` - URGENT
    PurposeEnum:
      enum:
      - LOGIN
      - RESET_PASSWORD
      type: string
      description: |-
        * `LOGIN` - Connexion
        * `RESET_PASSWORD` - Réinitialisation mot de passe
    Register:
      type: object
      properties:
        username:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 8
        password_confirm:
          type: string
          writeOnly: true
          minLength: 8
        phone:
          type: string
          maxLength: 20
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - email
      - password
      - password_confirm
      - username
    RegisterResponse:
      type: object
      properties:
        refresh:
          type: string
        access:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required:
      - access
      - refresh
      - user
    ResetPassword:
      type: object
      properties:
        identifier:
          type: string
        otp:
          type: string
          maxLength: 8
          minLength: 4
        new_password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - identifier
      - new_password
      - otp
    RoleEnum:
      enum:
      - ADMIN
      - MINISTRY_SUPERVISOR
      - HOSPITAL_MANAGER
      - FACILITY_AGENT
      type: string
      description: |-
        * `ADMIN` - Administrateur
        * `MINISTRY_SUPERVISOR` - Superviseur ministère
        * `HOSPITAL_MANAGER` - Responsable hôpital
        * `FACILITY_AGENT` - Agent d'établissement
    SeverityEnum:
      enum:
      - LOW
      - MEDIUM
      - HIGH
      - URGENT
      type: string
      description: |-
        * `LOW` - Faible
        * `MEDIUM` - Moyenne
        * `HIGH` - Élevée
        * `URGENT` - Urgente
    StatusEnum:
      enum:
      - RECEIVED
      - UNDER_REVIEW
      - IN_PROGRESS
      - WAITING_INFO
      - RESOLVED
      - REJECTED
      - CLOSED
      type: string
      description: |-
        * `RECEIVED` - Reçue
        * `UNDER_REVIEW` - En examen
        * `IN_PROGRESS` - En cours
        * `WAITING_INFO` - En attente d'informations
        * `RESOLVED` - Résolue
        * `REJECTED` - Rejetée
        * `CLOSED` - Clôturée
    SubmissionTypeEnum:
      enum:
      - ANONYMOUS
      - CONFIDENTIAL
      - IDENTIFIED
      type: string
      description: |-
        * `ANONYMOUS` - Anonyme
        * `CONFIDENTIAL` - Confidentiel
        * `IDENTIFIED` - Identifié
    SubmitterProfileChoices:
      type: object
      description: Métadonnées exposées à l'UI pour le choix du profil déclarant.
      properties:
        value:
          type: string
        label:
          type: string
        description:
          type: string
        requires_auth:
          type: boolean
        allows_reported_agent:
          type: boolean
      required:
      - allows_reported_agent
      - description
      - label
      - requires_auth
      - value
    SubmitterProfileEnum:
      enum:
      - CITIZEN
      - FACILITY_AGENT
      type: string
      description: |-
        * `CITIZEN` - Usager / citoyen
        * `FACILITY_AGENT` - Agent d'établissement
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
          title: Nom d’utilisateur
          description: Requis. 150 caractères maximum. Uniquement des lettres, nombres
            et les caractères « @ », « . », « + », « - » et « _ ».
        email:
          type: string
          format: email
          readOnly: true
          title: Adresse électronique
        first_name:
          type: string
          readOnly: true
          title: Prénom
        last_name:
          type: string
          readOnly: true
          title: Nom
        phone:
          type: string
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
      required:
      - email
      - first_name
      - id
      - is_active
      - last_name
      - phone
      - role
      - username
    UserFacilityAssignment:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
        user_id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        facility:
          type: integer
        facility_code:
          type: string
          readOnly: true
        facility_name:
          type: string
          readOnly: true
        assigned_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assigned_at
      - facility
      - facility_code
      - facility_name
      - id
      - user
      - user_id
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
